<!DOCTYPE html>
<html>
    <head>
        <title>Form</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <!-- banner -->
        <div id="notification-banner" class="banner">
         <span id="banner-text">Welcome to the Academic Dashboard!</span>
        </div>

        <!-- form creation -->
        <form id="data-entry-form">
            <div class="entry">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name">
            </div>
    
            <div class="entry">
                <label for="regNo">Registration No:</label>
                <input type="text" id="regNo" name="regNo">
            </div>

            <div class="entry">
                <label for="cat">CAT Marks (0-30):</label>
                <input type="number" id="cat" name="cat">
            </div>

            <div class="entry">
                <label for="exam">Exam Marks (0-70):</label>
                <input type="number" id="exam" name="exam">
            </div>
    
            <input type="submit" value="Submit" class="submit">
        </form>
        <!-- notifications -->
        <div id="notification" class="notification"></div>
        
        <!-- results container -->
        <div id="results-container"></div>
       
        <!-- javascript connection -->
        <script src="index.js"></script>
    </body>
</html>
